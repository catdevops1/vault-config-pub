global:
  enabled: true

injector:
  enabled: false

server:
  image:
    repository: hashicorp/vault
    tag: 1.18.3

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  dataStorage:
    enabled: true
    existingClaim: vault-data

  extraSecretEnvironmentVars:
    - envName: AWS_ACCESS_KEY_ID
      secretName: vault-aws-credentials
      secretKey: AWS_ACCESS_KEY_ID
    - envName: AWS_SECRET_ACCESS_KEY
      secretName: vault-aws-credentials
      secretKey: AWS_SECRET_ACCESS_KEY

  ha:
    enabled: false

  standalone:
    enabled: true
    config: |
      ui = true

      listener "tcp" {
        tls_disable = 1
        address     = "[::]:8200"
        cluster_address = "[::]:8201"
      }

      storage "file" {
        path = "/vault/data"
      }

      seal "awskms" {
        region     = "<YOUR-AWS-REGION>"
        kms_key_id = "<YOUR-KMS-KEY-ARN>"
      }

ui:
  enabled: true
  serviceType: ClusterIP
